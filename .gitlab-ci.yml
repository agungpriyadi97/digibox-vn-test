# .gitlab-ci.yml
# Katalon Studio CI/CD untuk project digibox-vn
# Menggunakan Chrome dan Firefox headless dengan anti-detection arguments

image:
  name: 'katalonstudio/katalon:11.1.3'
  entrypoint: [""]

stages:
  - test

variables:
  CONTINUE_ON_FAILURE: "true"
  GS_OPTIONS: "-Xmx2048m -Xms512m -Djava.shm.size=2g"

katalon_digiboxvn_test:
  stage: test
  tags:
    - infra
  timeout: 2h
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

  before_script:
    # Bersihkan folder artifact lama
    - rm -rf Reports Screenshot || true
    # Update apt dan install ffmpeg untuk video recording (opsional)
    - apt-get update -o Acquire::AllowInsecureRepositories=true -o Doomsday::Ignore=true -y || true
    - apt-get install -y --allow-unauthenticated ffmpeg
    - ffmpeg -version

  script:
    # Tampilkan IP publik (untuk debug)
    - curl ifconfig.me

    # Jalankan Test Suite Collection (dengan ekstensi .ts)
    - echo "Menjalankan Test Suite Collection: Test Suites/WEB/Web_Test_Suite_Collection/Regression_Digiboxvn_Web.ts"
    - |
      katalonc.sh -noSplash -runMode=console \
        -projectPath="$CI_PROJECT_DIR/digibox-vn.prj" \
        -retry=0 -apiKey="$KATALON_API_KEY" \
        -testSuiteCollectionPath="Test Suites/WEB/Web_Test_Suite_Collection/Regression_Digiboxvn_Web.ts" \
        -browserType="Chrome (headless)" \
        -reportFolder="Reports/Chrome_Reports" \
        -reportFileName="Chrome_Report" \
        --config \
        -webui.autoUpdateDrivers=true \
        -webui.chrome.args="--disable-blink-features=AutomationControlled --user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 --no-sandbox --disable-dev-shm-usage --disable-gpu --window-size=1920,1080"

    # Jika ingin menjalankan Firefox juga, uncomment bagian di bawah
    # - |
    #   katalonc.sh -noSplash -runMode=console \
    #     -projectPath="$CI_PROJECT_DIR/digibox-vn.prj" \
    #     -retry=0 -apiKey="$KATALON_API_KEY" \
    #     -testSuiteCollectionPath="Test Suites/WEB/Web_Test_Suite_Collection/Regression_Digiboxvn_Web.ts" \
    #     -browserType="Firefox (headless)" \
    #     -reportFolder="Reports/Firefox_Reports" \
    #     -reportFileName="Firefox_Report" \
    #     --config \
    #     -webui.autoUpdateDrivers=true \
    #     -webui.firefox.args="-headless -width 1920 -height 1080" \
    #     -webui.firefox.preferences="dom.webdriver.enabled=false; useAutomationExtension=false"

  after_script:
    - echo "Pipeline selesai. Mengupload artifacts..."

  artifacts:
    when: always
    paths:
      - Reports/
      - Screenshot/
    expire_in: 7 days