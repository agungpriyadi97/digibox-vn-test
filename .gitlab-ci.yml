image:
  name: 'katalonstudio/katalon:11.1.3'
  entrypoint: [""]

stages:
  - test

variables:
  # Ensures the job continues through all browser types even if one fails
  CONTINUE_ON_FAILURE: "true"
  # CRITICAL: Increase shared memory size for Chrome Headless in Docker
  # This prevents the "Out of Memory" crashes on heavy pages like Digibox
  GS_OPTIONS: "-Xmx2048m -Xms512m -Djava.shm.size=2g"

katalon_digiboxvn_test:
  stage: test
  tags:
    - infra
  # Extended timeout for sequential cross-browser execution
  timeout: 12h  
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  
  before_script:
    # Bersihkan folder Reports dari sisa pipeline sebelumnya agar artifact tidak menumpuk
    - rm -rf Reports/* || true
    # Force apt to ignore the unverified Edge repository so it doesn't return exit code 1
    - apt-get update -o Acquire::AllowInsecureRepositories=true -o Doomsday::Ignore=true -y || true
    # Install FFmpeg cleanly from standard Ubuntu repos to enable video recording
    - apt-get install -y --allow-unauthenticated ffmpeg
    - ffmpeg -version

  script:
    - curl ifconfig.me
    - |
      # --- DIGIBOX PATH RESOLUTION ---
      if [ -z "$TEST_PATH" ]; then
        echo "Running default Digibox Regression Collection..."
        # Updated Path to the Web Test Suite Collection
        export FINAL_PATH="Test Suites/WEB/Web_Test_Suite_Collection/Regression_Digiboxvn_Web"
        # Since this is a Collection, we use the Collection argument
        export ARG_TYPE="-testSuiteCollectionPath"
      else
        echo "Running custom test: $TEST_PATH"
        # Parses custom input like -testSuitePath=Test Suites/Folder/Suite
        export FINAL_PATH=$(echo "$TEST_PATH" | cut -d'=' -f2)
        export ARG_TYPE=$(echo "$TEST_PATH" | cut -d'=' -f1)
      fi

      # --- SEQUENTIAL CROSS-BROWSER EXECUTION (Chrome & Firefox Only) ---

      echo "Starting Execution 1/2: Chrome (Headless)..."
      katalonc.sh -noSplash -runMode=console \
        -projectPath="$CI_PROJECT_DIR/digibox-vn.prj" \
        -retry=0 -apiKey="$KATALON_API_KEY" \
        "$ARG_TYPE=$FINAL_PATH" \
        -browserType="Chrome (headless)" \
        -reportFolder="Reports/Chrome_Reports" \
        -reportFileName="Chrome_Report" \
        --config -webui.autoUpdateDrivers=true || echo "Chrome tests completed."

      echo "Starting Execution 2/2: Firefox (Headless)..."
      katalonc.sh -noSplash -runMode=console \
        -projectPath="$CI_PROJECT_DIR/digibox-vn.prj" \
        -retry=0 -apiKey="$KATALON_API_KEY" \
        "$ARG_TYPE=$FINAL_PATH" \
        -browserType="Firefox (headless)" \
        -reportFolder="Reports/Firefox_Reports" \
        -reportFileName="Firefox_Report" \
        --config -webui.autoUpdateDrivers=true || echo "Firefox tests completed."

    # --- ARTIFACT PURGE & RETENTION CLEANUP (SAFE VERSION) ---
    - echo "Cleaning up heavy video files from runner cache..."
    # Menghapus rekaman video (.mp4) lama dari workspace runner lokal jika usianya sudah di atas 30 hari
    - find Reports/ -type f -name "*.mp4" -mtime +30 -exec rm -f {} \; || true
    # PERBAIKAN: Logika pembersihan file non-HTML yang salah sebelumnya telah dihapus.
    # Seluruh manajemen retensi laporan (.html, .xml) kini diserahkan sepenuhnya ke fitur 'expire_in' milik GitLab di bawah ini.

  artifacts:
    # 'always' ensures reports are uploaded even if tests fail
    when: always
    paths:
      - Reports/
      - Screenshot/
      - failure_*.html
    # Reports kept for a maximum of 2 months to align with your retention settings
    expire_in: 2 mos